<!DOCTYPE html>
<html>
<head>
  <title>Tea Inventory</title>

  <style>
    body { font-family: Arial; padding: 20px; }
    table { border-collapse: collapse; width: 100%; font-size: 12px; }
    th, td { border: 1px solid #ddd; padding: 6px; text-align: center; }
    th { background: green; color: white; }
  </style>
</head>

<body>

<h2>Tea Inventory System</h2>
<input type="text" id="search" placeholder="Search anything..." style="padding:8px; width:250px; margin-bottom:10px;">
<select id="statusFilter" style="padding:8px; margin-left:10px;">
  <option value="">All Status</option>
  <option value="SOLD">SOLD</option>
  <option value="UNSOLD">UNSOLD</option>
</select>
<h3>Total KG: <span id="totalKg">0</span></h3>

<table>
<thead>
<tr>
<th>DATE</th>
<th>MARK</th>
<th>INV.NO</th>
<th>GRADE</th>
<th>BAGS</th>
<th>KG/BAG</th>
<th>TOTAL</th>
<th>A-B-C-D</th>
<th>SALE NO</th>
<th>ALLOTMENT DATE</th>
<th>BROKER</th>
<th>SALE DATE</th>
<th>RATE</th>
<th>W/H</th>
<th>STATUS</th>
</tr>
</thead>

<tbody id="table-body"></tbody>
</table>

<script>


const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSjv-zCgncu_aKEl3SAiluxOpLjPMxe1plfltAKLCaPAjhtooInavNPBSyfFvG7nDSCWYlovWde3B76/pub?output=csv";

let allData = [];

fetch(csvUrl)
  .then(res => res.text())
  .then(data => {

    const rows = data.trim().split("\n");

    allData = rows.slice(1).map(row => row.split(","));

    renderTable(allData);
  });

function renderTable(data) {
  const table = document.getElementById("table-body");
  table.innerHTML = "";

  let total = 0;

  data.forEach(cols => {

    if(cols.length < 10) return;

    total += Number(cols[6]) || 0; // TOTAL column

    const tr = document.createElement("tr");

    tr.innerHTML = cols.map(c => `<td>${c}</td>`).join("");

    table.appendChild(tr);
  });

  document.getElementById("totalKg").innerText = total;
}

// 🔍 SEARCH
document.getElementById("search").addEventListener("input", function() {
  applyFilters();
});

// 🎯 FILTER
document.getElementById("statusFilter").addEventListener("change", function() {
  applyFilters();
});

function applyFilters() {

  const search = document.getElementById("search").value.toLowerCase();
  const status = document.getElementById("statusFilter").value;

  const filtered = allData.filter(cols => {

    const rowText = cols.join(" ").toLowerCase();

    const matchSearch = rowText.includes(search);

    const matchStatus = status === "" || cols[14] === status;

    return matchSearch && matchStatus;
  });

  renderTable(filtered);
}


</script>

</body>
</html>
